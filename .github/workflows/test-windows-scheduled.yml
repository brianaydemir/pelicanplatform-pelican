---
name: Run Tests (Windows) [on schedule]

on:
  schedule:
    - cron: "0 7 * * *"  # at 07:00 every day
  workflow_dispatch:

jobs:
  run-tests:
    name: Test
    uses: ./.github/workflows/test-windows.yml
    with:
      race_detection: true

  analyze-runs:
    name: Analyze Runs
    if: ${{ !cancelled() }}
    needs: [run-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Analyze test results
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 .github/scripts/analyze-junit-results/analyze_junit_results.py \
            --workflow "Run Tests (Windows) [on schedule]" \
            --artifacts-dir artifacts

      - name: Upload failure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-failure-report-${{ runner.os }}
          path: artifacts/test-failure-report.md
          overwrite: true
